<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CPU Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6%;
    user-select: none;
  }
  /* Background setting: let the dashboard wallpaper show through. */
  body.bg-transparent { background: transparent; }
  body.bg-glass { background: rgba(11, 14, 20, 0.55); }
  .ring { position: relative; height: 72%; aspect-ratio: 1; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: #1c2331; stroke-width: 9; }
  .ring .value { fill: none; stroke: var(--accent, #00d4ff); stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring .center .big { font-size: clamp(20px, 9vh, 44px); font-weight: 600; line-height: 1; }
  .ring .center .cap { font-size: clamp(9px, 3vh, 13px); color: #7d8697; letter-spacing: 0.14em; margin-top: 4px; }
  #stats { display: flex; flex-direction: column; gap: 8%; }
  .stat .label { font-size: clamp(9px, 3vh, 13px); color: #7d8697; letter-spacing: 0.1em; text-transform: uppercase; }
  .stat .val { font-size: clamp(16px, 7vh, 34px); font-weight: 600; }
  .stat .val small { font-size: 55%; color: #7d8697; font-weight: 400; }
  #hint { position: fixed; left: 12px; bottom: 8px; font-size: clamp(8px, 2.4vh, 11px); color: #545d6e; max-width: 92%; }
  #hint[hidden] { display: none; }
</style>
</head>
<body>
  <div class="ring">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="44"></circle>
      <circle class="value" id="ringValue" cx="50" cy="50" r="44"></circle>
    </svg>
    <div class="center">
      <div class="big" id="load">--</div>
      <div class="cap">CPU LOAD</div>
    </div>
  </div>
  <div id="stats"></div>
  <div id="hint" hidden>For per-core CPU temps install PawnIO and run as administrator.</div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  const CIRCUMFERENCE = 2 * Math.PI * 44;
  const ring = document.getElementById('ringValue');
  ring.style.strokeDasharray = String(CIRCUMFERENCE);
  ring.style.strokeDashoffset = String(CIRCUMFERENCE);

  WW.onInit((state) => {
    document.body.classList.toggle('bg-transparent', state.settings.bgStyle === 'transparent');
    document.body.classList.toggle('bg-glass', state.settings.bgStyle === 'glass');
    document.body.style.setProperty('--accent', state.settings.accentColor || '#00d4ff');
  });

  function pick(settingId, opts) {
    return (settingId && WW.sensorById(settingId)) || WW.findSensor(opts);
  }

  WW.onSensors(() => {
    const s = WW.settings;
    const load = pick(s.loadSensorId, {
      type: 'Load', deviceTypeIncludes: ['cpu'], preferredNames: ['CPU Total'],
    }) || WW.sensorById('sys:cpu:load');

    // Preference order for temperature: a real CPU sensor (needs elevation + PawnIO),
    // then any ACPI thermal zone (driver-free but firmware-dependent).
    const temp = pick(s.tempSensorId, {
      type: 'Temperature', deviceTypeIncludes: ['cpu'],
      preferredNames: ['Core (Tctl/Tdie)', 'CPU Package', 'Core Average', 'Core Max'],
    })
      || WW.findSensor({ type: 'Temperature', deviceTypeIncludes: ['system'], nameIncludes: ['cpu'] })
      || WW.findSensor({ type: 'Temperature', deviceTypeIncludes: ['system'], nameIncludes: ['thermal', 'acpi'] });

    const loadValue = load && load.value != null ? Math.min(100, load.value) : null;
    document.getElementById('load').textContent = loadValue == null ? '--' : Math.round(loadValue) + '%';
    ring.style.strokeDashoffset = String(CIRCUMFERENCE * (1 - (loadValue || 0) / 100));

    // Fill the three stat rows with whatever this machine can actually provide, so the
    // widget never shows dead "--" rows on systems without the kernel-driver sensors.
    const candidates = [
      { label: 'Temp', unit: ' °C', decimals: 0, sensor: temp },
      { label: 'Clock', unit: ' MHz', decimals: 0,
        sensor: WW.findSensor({ type: 'Clock', deviceTypeIncludes: ['cpu'], nameIncludes: ['core #1', 'core'] }) },
      { label: 'Power', unit: ' W', decimals: 1,
        sensor: WW.findSensor({ type: 'Power', deviceTypeIncludes: ['cpu'], preferredNames: ['CPU Package', 'Package'] }) },
      { label: 'Memory', unit: ' %', decimals: 0, sensor: WW.sensorById('sys:mem:load') },
      { label: 'Mem Used', unit: ' GB', decimals: 1, sensor: WW.sensorById('sys:mem:used') },
      { label: 'Net Down', unit: ' MB/s', decimals: 1, scale: 1 / 1048576, sensor: WW.sensorById('sys:net:down') },
    ];
    const rows = candidates.filter((c) => c.sensor && c.sensor.value != null).slice(0, 3);

    const stats = document.getElementById('stats');
    stats.textContent = '';
    for (const row of rows) {
      const stat = document.createElement('div');
      stat.className = 'stat';
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = row.label;
      const val = document.createElement('div');
      val.className = 'val';
      const value = (row.sensor.value * (row.scale || 1)).toFixed(row.decimals);
      const small = document.createElement('small');
      small.textContent = row.unit;
      val.append(value, small);
      stat.append(label, val);
      stats.appendChild(stat);
    }

    document.getElementById('hint').hidden = !!temp;
  });
</script>
</body>
</html>
