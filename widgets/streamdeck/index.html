<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stream Deck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  #grid {
    display: grid;
    gap: 8px;
    padding: 8px;
    width: 100%;
    height: 100%;
    place-content: center;
    box-sizing: border-box;
  }
  /* Physical Stream Deck key look: raised rounded face with a soft top light. */
  .key {
    position: relative;
    border-radius: 14px;
    background: linear-gradient(165deg, #2a3040 0%, #171b24 55%, #0d1017 100%);
    border: 1px solid #343d50;
    box-shadow: 0 3px 10px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    min-height: 0;
    transition: transform 0.06s ease, box-shadow 0.12s ease;
  }
  .key:active { transform: scale(0.94); box-shadow: 0 0 0 2px #00d4ff inset, 0 1px 4px rgba(0,0,0,0.6); }
  .key.empty {
    background: linear-gradient(165deg, #181c26 0%, #10131b 60%, #0a0d13 100%);
    border-color: #202636;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.55);
    cursor: default;
  }
  /* When empty keys are hidden they still occupy the grid (so used-key positions and
     click coordinates stay correct) but render invisibly. */
  .key.empty.hidden { background: transparent; border-color: transparent; box-shadow: none; }
  #picker {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; gap: 6px; padding: 6px; justify-content: center;
    background: rgba(5,7,11,0.85); flex-wrap: wrap;
  }
  #picker button {
    font: inherit; font-size: clamp(9px, 3vh, 13px);
    color: #e8ecf2; background: #171c28; border: 1px solid #232a3a;
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
  }
  #picker button.active { border-color: #00d4ff; color: #00d4ff; }
  #picker[hidden] { display: none; }
  .key img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 13px; }
  .key .title {
    position: absolute; left: 0; right: 0; bottom: 0;
    font-size: clamp(8px, 2.6vh, 12px);
    text-align: center;
    padding: 2px 3px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .key .fallback {
    font-size: clamp(9px, 3.2vh, 14px);
    color: #aeb7c4;
    text-align: center;
    padding: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 92%;
  }
  #message {
    position: fixed; inset: 0;
    display: none; flex-direction: column; gap: 1.4vh;
    align-items: center; justify-content: center;
    text-align: center; padding: 18px;
    color: #7d8697; font-size: clamp(12px, 4.5vh, 18px);
    background: #0b0e14;
  }
  #message small { color: #545d6e; font-size: 80%; max-width: 90%; }
</style>
</head>
<body>
  <div id="grid"></div>
  <div id="picker" hidden></div>
  <div id="message"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  const cfg = { rows: 0, cols: 0, showEmpty: true, hideWindow: true, profileName: '', keyShape: 'fill' };
  let lastProfile = null;

  WW.onInit((state) => {
    const s = state.settings;
    cfg.rows = Number(s.rowsOverride) || 0;
    cfg.cols = Number(s.colsOverride) || 0;
    cfg.showEmpty = s.showEmpty !== 'off';
    cfg.hideWindow = s.hideWindow !== 'off';
    cfg.profileName = s.profileName || '';
    cfg.keyShape = s.keyShape === 'square' ? 'square' : 'fill';
    poll();
  });

  WW.onStreamDeck(render);
  window.addEventListener('resize', () => { if (lastProfile) render(lastProfile); });

  function poll() {
    WW.requestStreamDeck({ profileName: cfg.profileName, hideWindow: cfg.hideWindow });
  }

  // Poll periodically so button icon/title changes and page switches in Stream Deck
  // appear on the panel.
  setInterval(poll, 4000);

  function showMessage(title, detail) {
    const grid = document.getElementById('grid');
    const msg = document.getElementById('message');
    grid.textContent = '';
    msg.style.display = 'flex';
    msg.innerHTML = '';
    const h = document.createElement('div');
    h.textContent = title;
    msg.appendChild(h);
    if (detail) {
      const s = document.createElement('small');
      s.textContent = detail;
      msg.appendChild(s);
    }
  }

  function renderPicker(profiles) {
    const picker = document.getElementById('picker');
    if (!profiles || profiles.length <= 1) {
      picker.hidden = true;
      return;
    }
    picker.hidden = false;
    picker.textContent = '';
    for (const name of profiles) {
      const b = document.createElement('button');
      b.textContent = name;
      if (name === cfg.profileName || (!cfg.profileName && name === profiles[0])) b.className = 'active';
      b.addEventListener('click', () => { cfg.profileName = name; poll(); });
      picker.appendChild(b);
    }
  }

  function render(profile) {
    lastProfile = profile;
    if (!profile || !profile.available) {
      renderPicker(null);
      showMessage('No Virtual Stream Deck found',
        'Open Elgato Stream Deck and create a Virtual Stream Deck (turn OFF "Hide unused keys"). Its buttons — and their real plugin actions — appear here.');
      return;
    }
    renderPicker(profile.profiles);
    const buttons = profile.buttons || [];
    if (buttons.length === 0) {
      showMessage('Virtual Stream Deck is empty', 'Add some buttons to it in Stream Deck.');
      return;
    }

    document.getElementById('message').style.display = 'none';
    const rows = cfg.rows || profile.rows || 3;
    const cols = cfg.cols || profile.cols || 5;

    const grid = document.getElementById('grid');
    if (cfg.keyShape === 'square') {
      // Real-device look: the largest square keys that fit, centered as a block.
      const pad = 8, gap = 8;
      const availW = window.innerWidth - pad * 2 - gap * (cols - 1);
      const availH = window.innerHeight - pad * 2 - gap * (rows - 1);
      const k = Math.max(24, Math.floor(Math.min(availW / cols, availH / rows)));
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + k + 'px)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', ' + k + 'px)';
    } else {
      // Fill: keys stretch so the grid uses every pixel of the slot.
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';
    }
    grid.textContent = '';

    // Index buttons by cell for O(1) placement.
    const byCell = new Map();
    for (const b of buttons) byCell.set(b.row + ',' + b.col, b);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const btn = byCell.get(r + ',' + c);
        const cell = document.createElement('div');
        if (!btn) {
          // Empty cells always occupy the grid (keeps positions and click coords right);
          // the showEmpty toggle only controls whether they're visible.
          cell.className = 'key empty' + (cfg.showEmpty ? '' : ' hidden');
          grid.appendChild(cell);
          continue;
        }
        cell.className = 'key';
        if (btn.image) {
          const img = document.createElement('img');
          img.src = btn.image;
          cell.appendChild(img);
          if (btn.title) {
            const t = document.createElement('div');
            t.className = 'title';
            t.textContent = btn.title;
            cell.appendChild(t);
          }
        } else {
          const f = document.createElement('div');
          f.className = 'fallback';
          f.textContent = btn.title || '●';
          cell.appendChild(f);
        }
        cell.addEventListener('click', () => {
          WW.streamDeckClick(btn.row, btn.col, rows, cols);
          WW.log('streamdeck: click ' + btn.row + ',' + btn.col + ' (' + (btn.title || '') + ')');
        });
        grid.appendChild(cell);
      }
    }
  }
</script>
</body>
</html>
