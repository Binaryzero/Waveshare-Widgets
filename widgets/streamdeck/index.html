<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stream Deck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  /* Background setting: let the dashboard wallpaper show through. */
  body.bg-transparent { background: transparent; }
  body.bg-glass { background: rgba(11, 14, 20, 0.55); }
  body.bg-transparent #live, body.bg-glass #live { background: transparent; }
  #grid {
    display: grid;
    gap: 8px;
    padding: 8px;
    width: 100%;
    height: 100%;
    place-content: center;
    box-sizing: border-box;
  }
  /* Physical Stream Deck key look: raised rounded face with a soft top light. */
  .key {
    position: relative;
    border-radius: 14px;
    background: linear-gradient(165deg, #2a3040 0%, #171b24 55%, #0d1017 100%);
    border: 1px solid #343d50;
    box-shadow: 0 3px 10px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    min-height: 0;
    transition: transform 0.06s ease, box-shadow 0.12s ease;
  }
  .key:active { transform: scale(0.94); box-shadow: 0 0 0 2px #00d4ff inset, 0 1px 4px rgba(0,0,0,0.6); }
  /* Empty keys are unoccupied SOCKETS, not buttons: a barely-there outline that keeps
     the layout readable without inflating the apparent button count. */
  .key.empty {
    background: rgba(255,255,255,0.02);
    border: 1px dashed #1a202c;
    box-shadow: none;
    cursor: default;
  }
  /* When empty keys are hidden they still occupy the grid (so used-key positions and
     click coordinates stay correct) but render invisibly. */
  .key.empty.hidden { background: transparent; border-color: transparent; box-shadow: none; }
  #picker {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; gap: 6px; padding: 6px; justify-content: center;
    background: rgba(5,7,11,0.85); flex-wrap: wrap;
  }
  #picker button {
    font: inherit; font-size: clamp(9px, 3vh, 13px);
    color: #e8ecf2; background: #171c28; border: 1px solid #232a3a;
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
  }
  #picker button.active { border-color: #00d4ff; color: #00d4ff; }
  #picker[hidden] { display: none; }
  .key img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 13px; }
  .key .title {
    position: absolute; left: 0; right: 0; bottom: 0;
    font-size: clamp(8px, 2.6vh, 12px);
    text-align: center;
    padding: 2px 3px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .key .fallback {
    font-size: clamp(9px, 3.2vh, 14px);
    color: #aeb7c4;
    text-align: center;
    padding: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 92%;
  }
  /* Live mirror: the VSD window's own pixels, letterboxed; taps map to key cells. */
  #live {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #0b0e14;
  }
  #live img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    display: block;
  }
  #liveFlash {
    position: fixed;
    border: 2px solid #00d4ff;
    border-radius: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  #message {
    position: fixed; inset: 0;
    display: none; flex-direction: column; gap: 1.4vh;
    align-items: center; justify-content: center;
    text-align: center; padding: 18px;
    color: #7d8697; font-size: clamp(12px, 4.5vh, 18px);
    background: #0b0e14;
  }
  #message small { color: #545d6e; font-size: 80%; max-width: 90%; }
</style>
</head>
<body>
  <div id="grid"></div>
  <div id="live"><img id="liveImg" alt="" draggable="false" /></div>
  <div id="liveFlash"></div>
  <div id="picker" hidden></div>
  <div id="message"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  const cfg = { rows: 0, cols: 0, showEmpty: true, hideWindow: true, profileName: '', keyShape: 'fill', live: true, liveRefresh: 400 };
  let lastProfile = null;
  let pollTimer = null;
  let captureTimer = null;

  // The on-panel picker remembers its choice across reloads (per-widget localStorage);
  // an explicit profileName in the widget settings always wins.
  function rememberedProfile() {
    try { return localStorage.getItem('ww-sd-profile') || ''; } catch (e) { return ''; }
  }

  WW.onInit((state) => {
    const s = state.settings;
    cfg.rows = Number(s.rowsOverride) || 0;
    cfg.cols = Number(s.colsOverride) || 0;
    cfg.showEmpty = s.showEmpty !== 'off';
    cfg.hideWindow = s.hideWindow !== 'off';
    cfg.profileName = s.profileName || rememberedProfile();
    cfg.keyShape = s.keyShape === 'square' ? 'square' : 'fill';
    cfg.live = s.liveMode !== 'off';
    cfg.liveRefresh = Math.min(5000, Math.max(150, Number(s.liveRefresh) || 400));
    document.body.classList.toggle('bg-transparent', s.bgStyle === 'transparent');
    document.body.classList.toggle('bg-glass', s.bgStyle === 'glass');
    schedulePolling();
    poll();
  });

  // Fast capture-only loop: the host answers {unchanged:true} for identical frames, so
  // polling quickly is cheap while the deck is idle.
  WW.onStreamDeckCapture((data) => {
    if (!cfg.live) return;
    if (data.image) {
      if (lastProfile && lastProfile.available) {
        if (!lastProfile.capture) lastProfile.capture = {};
        lastProfile.capture.image = data.image;
        renderLive(lastProfile);
      }
    } else if (data.available === false) {
      poll(); // window went away: refresh the profile so the fallback/message shows
    }
  });

  WW.onStreamDeck(render);
  window.addEventListener('resize', () => { if (lastProfile) render(lastProfile); });

  function poll() {
    WW.requestStreamDeck({ profileName: cfg.profileName, hideWindow: cfg.hideWindow, live: cfg.live });
  }

  // The profile poll (buttons, picker, page switches) stays relaxed; in live mode a
  // separate capture-only loop carries the actual pixels at the configured rate.
  function schedulePolling() {
    clearInterval(pollTimer);
    pollTimer = setInterval(poll, 4000);
    clearInterval(captureTimer);
    if (cfg.live) captureTimer = setInterval(() => WW.requestStreamDeckCapture(), cfg.liveRefresh);
  }

  function showMessage(title, detail) {
    const grid = document.getElementById('grid');
    const msg = document.getElementById('message');
    grid.textContent = '';
    msg.style.display = 'flex';
    msg.innerHTML = '';
    const h = document.createElement('div');
    h.textContent = title;
    msg.appendChild(h);
    if (detail) {
      const s = document.createElement('small');
      s.textContent = detail;
      msg.appendChild(s);
    }
  }

  // ---- live mirror -------------------------------------------------------------

  function setLiveVisible(on) {
    document.getElementById('live').style.display = on ? 'flex' : 'none';
    document.getElementById('grid').style.display = on ? 'none' : 'grid';
  }

  function renderLive(profile) {
    document.getElementById('message').style.display = 'none';
    setLiveVisible(true);
    const img = document.getElementById('liveImg');
    img.src = profile.capture.image;
    img.dataset.rows = cfg.rows || profile.rows || 3;
    img.dataset.cols = cfg.cols || profile.cols || 5;
  }

  // Map a tap on the letterboxed capture back to a key cell and trigger it.
  document.getElementById('live').addEventListener('click', (ev) => {
    const img = document.getElementById('liveImg');
    if (!img.naturalWidth || !img.naturalHeight) return;
    const rows = Number(img.dataset.rows) || 3;
    const cols = Number(img.dataset.cols) || 5;
    const r = img.getBoundingClientRect();
    const x = ev.clientX - r.left;
    const y = ev.clientY - r.top;
    if (x < 0 || y < 0 || x >= r.width || y >= r.height) return;
    const col = Math.min(cols - 1, Math.floor(x / (r.width / cols)));
    const row = Math.min(rows - 1, Math.floor(y / (r.height / rows)));
    WW.streamDeckClick(row, col, rows, cols);
    WW.log('streamdeck: live click ' + row + ',' + col);

    // brief highlight over the tapped cell
    const flash = document.getElementById('liveFlash');
    flash.style.left = (r.left + col * (r.width / cols)) + 'px';
    flash.style.top = (r.top + row * (r.height / rows)) + 'px';
    flash.style.width = (r.width / cols) + 'px';
    flash.style.height = (r.height / rows) + 'px';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 220);
  });

  function renderPicker(profiles) {
    const picker = document.getElementById('picker');
    if (!profiles || profiles.length <= 1) {
      picker.hidden = true;
      return;
    }
    picker.hidden = false;
    picker.textContent = '';
    for (const name of profiles) {
      const b = document.createElement('button');
      b.textContent = name;
      if (name === cfg.profileName || (!cfg.profileName && name === profiles[0])) b.className = 'active';
      b.addEventListener('click', () => {
        cfg.profileName = name;
        try { localStorage.setItem('ww-sd-profile', name); } catch (e) { /* private mode */ }
        poll();
      });
      picker.appendChild(b);
    }
  }

  function render(profile) {
    lastProfile = profile;
    if (!profile || !profile.available) {
      renderPicker(null);
      setLiveVisible(false);
      showMessage('No Virtual Stream Deck found',
        'Open Elgato Stream Deck and create a Virtual Stream Deck (turn OFF "Hide unused keys"). Its buttons — and their real plugin actions — appear here.');
      return;
    }
    renderPicker(profile.profiles);

    // Live mirror: render the VSD window's actual pixels (dynamic key faces included);
    // the icon grid below remains the fallback when no capture is available.
    if (cfg.live && profile.capture && profile.capture.image) {
      renderLive(profile);
      return;
    }
    setLiveVisible(false);

    const buttons = profile.buttons || [];
    if (buttons.length === 0) {
      showMessage('Virtual Stream Deck is empty', 'Add some buttons to it in Stream Deck.');
      return;
    }

    document.getElementById('message').style.display = 'none';
    const rows = cfg.rows || profile.rows || 3;
    const cols = cfg.cols || profile.cols || 5;

    const grid = document.getElementById('grid');
    if (cfg.keyShape === 'square') {
      // Real-device look: the largest square keys that fit, centered as a block.
      const pad = 8, gap = 8;
      const availW = window.innerWidth - pad * 2 - gap * (cols - 1);
      const availH = window.innerHeight - pad * 2 - gap * (rows - 1);
      const k = Math.max(24, Math.floor(Math.min(availW / cols, availH / rows)));
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + k + 'px)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', ' + k + 'px)';
    } else {
      // Fill: keys stretch so the grid uses every pixel of the slot.
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';
    }
    grid.textContent = '';

    // Index buttons by cell for O(1) placement.
    const byCell = new Map();
    for (const b of buttons) byCell.set(b.row + ',' + b.col, b);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const btn = byCell.get(r + ',' + c);
        const cell = document.createElement('div');
        if (!btn) {
          // Empty cells always occupy the grid (keeps positions and click coords right);
          // the showEmpty toggle only controls whether they're visible.
          cell.className = 'key empty' + (cfg.showEmpty ? '' : ' hidden');
          grid.appendChild(cell);
          continue;
        }
        cell.className = 'key';
        if (btn.image) {
          const img = document.createElement('img');
          img.src = btn.image;
          cell.appendChild(img);
          if (btn.title) {
            const t = document.createElement('div');
            t.className = 'title';
            t.textContent = btn.title;
            cell.appendChild(t);
          }
        } else {
          const f = document.createElement('div');
          f.className = 'fallback';
          f.textContent = btn.title || '●';
          cell.appendChild(f);
        }
        cell.addEventListener('click', () => {
          WW.streamDeckClick(btn.row, btn.col, rows, cols);
          WW.log('streamdeck: click ' + btn.row + ',' + btn.col + ' (' + (btn.title || '') + ')');
        });
        grid.appendChild(cell);
      }
    }
  }
</script>
</body>
</html>
