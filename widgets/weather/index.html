<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Weather</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5%;
    user-select: none;
  }
  #icon { font-size: clamp(40px, 26vh, 110px); line-height: 1; }
  #main { display: flex; flex-direction: column; gap: 0.8vh; }
  #temp { font-size: clamp(30px, 18vh, 76px); font-weight: 200; line-height: 1; }
  #temp small { font-size: 45%; color: var(--accent, #ffd166); font-weight: 400; }
  #desc { font-size: clamp(12px, 5vh, 22px); color: #aeb7c4; }
  #meta { font-size: clamp(10px, 4vh, 16px); color: #7d8697; }
  #place { font-size: clamp(10px, 4vh, 16px); color: var(--accent, #ffd166); letter-spacing: 0.08em; text-transform: uppercase; }
  #error { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; color: #545d6e; font-size: 14px; text-align: center; padding: 12px; background: #0b0e14; }
</style>
</head>
<body>
  <div id="icon">…</div>
  <div id="main">
    <div id="place"></div>
    <div id="temp">--<small>°</small></div>
    <div id="desc"></div>
    <div id="meta"></div>
  </div>
  <div id="error"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  // WMO weather interpretation codes -> label + emoji
  const WMO = {
    0: ['Clear sky', '☀️'], 1: ['Mainly clear', '🌤️'], 2: ['Partly cloudy', '⛅'], 3: ['Overcast', '☁️'],
    45: ['Fog', '🌫️'], 48: ['Rime fog', '🌫️'],
    51: ['Light drizzle', '🌦️'], 53: ['Drizzle', '🌦️'], 55: ['Heavy drizzle', '🌧️'],
    56: ['Freezing drizzle', '🌧️'], 57: ['Freezing drizzle', '🌧️'],
    61: ['Light rain', '🌦️'], 63: ['Rain', '🌧️'], 65: ['Heavy rain', '🌧️'],
    66: ['Freezing rain', '🌧️'], 67: ['Freezing rain', '🌧️'],
    71: ['Light snow', '🌨️'], 73: ['Snow', '🌨️'], 75: ['Heavy snow', '❄️'], 77: ['Snow grains', '❄️'],
    80: ['Light showers', '🌦️'], 81: ['Showers', '🌧️'], 82: ['Violent showers', '⛈️'],
    85: ['Snow showers', '🌨️'], 86: ['Snow showers', '🌨️'],
    95: ['Thunderstorm', '⛈️'], 96: ['Thunderstorm + hail', '⛈️'], 99: ['Thunderstorm + hail', '⛈️'],
  };

  let refreshTimer = null;

  WW.onInit((state) => {
    document.body.style.setProperty('--accent', state.settings.accentColor || '#ffd166');
    refresh();
    clearInterval(refreshTimer);
    refreshTimer = setInterval(refresh, 10 * 60 * 1000);
  });

  // Resolve a typed city name to coordinates via Open-Meteo's free geocoder,
  // caching per query so we geocode each location exactly once.
  async function geocode(query) {
    const cacheKey = 'ww.geo.' + query.trim().toLowerCase();
    try {
      const cached = JSON.parse(localStorage.getItem(cacheKey));
      if (cached && cached.lat != null) return cached;
    } catch (e) { /* bad cache entry; refetch */ }

    const url = 'https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&format=json&name=' +
      encodeURIComponent(query.trim());
    const response = await fetch(url);
    if (!response.ok) throw new Error('geocoder HTTP ' + response.status);
    const data = await response.json();
    const hit = data.results && data.results[0];
    if (!hit) throw new Error('no match for "' + query + '"');

    const place = {
      lat: hit.latitude,
      lon: hit.longitude,
      label: hit.name + (hit.admin1 && hit.admin1 !== hit.name ? ', ' + hit.admin1 : ''),
    };
    localStorage.setItem(cacheKey, JSON.stringify(place));
    return place;
  }

  // The location setting is either a picked place object {label, latitude, longitude}
  // (chosen from the Settings search dropdown — unambiguous) or a plain string, in
  // which case the geocoder's best match (largest/most relevant) is used.
  async function resolvePlace(settings) {
    const loc = settings.location;
    if (loc && typeof loc === 'object' && loc.latitude != null && loc.longitude != null) {
      return { lat: loc.latitude, lon: loc.longitude, label: loc.label || '' };
    }
    const query = (typeof loc === 'string' ? loc : '').trim() || 'New York';
    return geocode(query);
  }

  async function refresh() {
    const s = WW.settings;
    try {
      const place = await resolvePlace(s);
      document.getElementById('place').textContent = place.label;

      const url = 'https://api.open-meteo.com/v1/forecast' +
        `?latitude=${place.lat}&longitude=${place.lon}` +
        '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min' +
        `&temperature_unit=${s.units === 'celsius' ? 'celsius' : 'fahrenheit'}` +
        '&wind_speed_unit=kmh&timezone=auto&forecast_days=1';
      const response = await fetch(url);
      if (!response.ok) throw new Error('forecast HTTP ' + response.status);
      const data = await response.json();

      const [label, emoji] = WMO[data.current.weather_code] || ['—', '🌡️'];
      document.getElementById('icon').textContent = emoji;
      document.getElementById('temp').innerHTML =
        Math.round(data.current.temperature_2m) + '<small>°' + (s.units === 'celsius' ? 'C' : 'F') + '</small>';
      document.getElementById('desc').textContent = label;
      document.getElementById('meta').textContent =
        'H ' + Math.round(data.daily.temperature_2m_max[0]) + '°  L ' + Math.round(data.daily.temperature_2m_min[0]) + '°' +
        '  ·  ' + data.current.relative_humidity_2m + '% RH';
      document.getElementById('error').style.display = 'none';
    } catch (e) {
      WW.log('weather failed: ' + e.message);
      const errorEl = document.getElementById('error');
      errorEl.textContent = 'Weather unavailable: ' + e.message + '. Check the location name in Settings.';
      errorEl.style.display = 'flex';
    }
  }
</script>
</body>
</html>
