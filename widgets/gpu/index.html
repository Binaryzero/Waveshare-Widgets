<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GPU Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6%;
    user-select: none;
  }
  /* Background setting: let the dashboard wallpaper show through. */
  body.bg-transparent { background: transparent; }
  body.bg-glass { background: rgba(11, 14, 20, 0.55); }
  .ring { position: relative; height: 72%; aspect-ratio: 1; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: #1c2331; stroke-width: 9; }
  .ring .value { fill: none; stroke: var(--accent, #76ff7a); stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring .center .big { font-size: clamp(20px, 9vh, 44px); font-weight: 600; line-height: 1; }
  .ring .center .cap { font-size: clamp(9px, 3vh, 13px); color: #7d8697; letter-spacing: 0.14em; margin-top: 4px; }
  .stats { display: flex; flex-direction: column; gap: 8%; }
  .stat .label { font-size: clamp(9px, 3vh, 13px); color: #7d8697; letter-spacing: 0.1em; text-transform: uppercase; }
  .stat .val { font-size: clamp(16px, 7vh, 34px); font-weight: 600; }
  .stat .val small { font-size: 55%; color: #7d8697; font-weight: 400; }
  .device { position: fixed; left: 12px; bottom: 8px; font-size: clamp(8px, 2.4vh, 11px); color: #545d6e; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="ring">
    <svg viewBox="0 0 100 100">
      <circle class="track" cx="50" cy="50" r="44"></circle>
      <circle class="value" id="ringValue" cx="50" cy="50" r="44"></circle>
    </svg>
    <div class="center">
      <div class="big" id="load">--</div>
      <div class="cap">GPU LOAD</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="label">Temp</div>
      <div class="val" id="temp">--<small> °C</small></div>
    </div>
    <div class="stat">
      <div class="label">Clock</div>
      <div class="val" id="clock">--<small> MHz</small></div>
    </div>
    <div class="stat">
      <div class="label">VRAM</div>
      <div class="val" id="vram">--<small> %</small></div>
    </div>
  </div>
  <div class="device" id="device"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  const GPU_TYPES = ['gpunvidia', 'gpuamd', 'gpuintel'];
  const CIRCUMFERENCE = 2 * Math.PI * 44;
  const ring = document.getElementById('ringValue');
  ring.style.strokeDasharray = String(CIRCUMFERENCE);
  ring.style.strokeDashoffset = String(CIRCUMFERENCE);

  WW.onInit((state) => {
    document.body.classList.toggle('bg-transparent', state.settings.bgStyle === 'transparent');
    document.body.classList.toggle('bg-glass', state.settings.bgStyle === 'glass');
    document.body.style.setProperty('--accent', state.settings.accentColor || '#76ff7a');
  });

  function pick(settingId, opts) {
    return (settingId && WW.sensorById(settingId)) || WW.findSensor(opts);
  }

  WW.onSensors(() => {
    const s = WW.settings;
    const load = pick(s.loadSensorId, {
      type: 'Load', deviceTypeIncludes: GPU_TYPES, preferredNames: ['GPU Core', 'D3D 3D'],
    });
    const temp = pick(s.tempSensorId, {
      type: 'Temperature', deviceTypeIncludes: GPU_TYPES, preferredNames: ['GPU Core', 'GPU Hot Spot'],
    });
    const clock = WW.findSensor({
      type: 'Clock', deviceTypeIncludes: GPU_TYPES, preferredNames: ['GPU Core'], nameIncludes: ['core'],
    });
    const vram = WW.findSensor({
      type: 'Load', deviceTypeIncludes: GPU_TYPES, preferredNames: ['GPU Memory'], nameIncludes: ['memory'],
    });

    const loadValue = load && load.value != null ? Math.min(100, load.value) : null;
    document.getElementById('load').textContent = loadValue == null ? '--' : Math.round(loadValue) + '%';
    ring.style.strokeDashoffset = String(CIRCUMFERENCE * (1 - (loadValue || 0) / 100));

    setStat('temp', temp, 0, ' °C');
    setStat('clock', clock, 0, ' MHz');
    setStat('vram', vram, 0, ' %');

    const any = load || temp || clock;
    document.getElementById('device').textContent = any ? any.device : 'No GPU sensors found';
  });

  function setStat(id, sensor, decimals, unit) {
    const el = document.getElementById(id);
    const value = sensor && sensor.value != null ? sensor.value.toFixed(decimals) : '--';
    el.innerHTML = value + '<small>' + unit + '</small>';
  }
</script>
</body>
</html>
