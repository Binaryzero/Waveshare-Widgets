<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    user-select: none;
  }
  /* Background setting: let the dashboard wallpaper show through. */
  body.bg-transparent { background: transparent; }
  body.bg-glass { background: rgba(11, 14, 20, 0.55); }
  #time {
    color: var(--time-color, var(--accent, #e8ecf2));
    font-size: calc(clamp(40px, 34vh, 160px) * var(--time-scale, 1));
    font-weight: 200;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  #time small { font-size: 40%; color: #7d8697; font-weight: 200; }
  #date { color: var(--date-color, #7d8697); font-size: calc(clamp(12px, 6vh, 26px) * var(--date-scale, 1)); font-weight: 400; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div id="time">--:--</div>
  <div id="date"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  let hour12 = false;
  let showSeconds = true;

  WW.onInit((state) => {
    document.body.classList.toggle('bg-transparent', state.settings.bgStyle === 'transparent');
    document.body.classList.toggle('bg-glass', state.settings.bgStyle === 'glass');
    document.body.style.setProperty('--accent', state.settings.accentColor || '#e8ecf2');
    const s = state.settings;
    // Time is accent-driven today: the host merges manifest defaults into settings,
    // so a timeColor still at its default falls through to the accent chain and
    // accentColor users see no change.
    const timeColor = (s.timeColor && String(s.timeColor).toLowerCase() !== '#e8ecf2')
      ? s.timeColor
      : (s.accentColor || '#e8ecf2');
    document.body.style.setProperty('--time-color', timeColor);
    document.body.style.setProperty('--time-scale', (Number(s.timeSize) || 100) / 100);
    document.body.style.setProperty('--date-color', s.dateColor || '#7d8697');
    document.body.style.setProperty('--date-scale', (Number(s.dateSize) || 100) / 100);
    hour12 = state.settings.hour12 === 'on';
    showSeconds = state.settings.showSeconds !== 'off';
    render();
  });

  function render() {
    const now = new Date();
    let hours = now.getHours();
    let suffix = '';
    if (hour12) {
      suffix = '<small>' + (hours >= 12 ? ' PM' : ' AM') + '</small>';
      hours = hours % 12 || 12;
    }
    const pad = (n) => String(n).padStart(2, '0');
    const time = (hour12 ? hours : pad(hours)) + ':' + pad(now.getMinutes()) +
      (showSeconds ? ':' + pad(now.getSeconds()) : '');
    document.getElementById('time').innerHTML = time + suffix;
    document.getElementById('date').textContent = now.toLocaleDateString(undefined, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    });
  }

  render();
  setInterval(render, 250);
</script>
</body>
</html>
