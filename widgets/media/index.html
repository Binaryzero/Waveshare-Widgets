<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    user-select: none;
  }
  #backdrop {
    position: fixed; inset: -30px;
    background-size: cover; background-position: center;
    filter: blur(24px) brightness(0.32);
    z-index: 0;
  }
  #layout { position: relative; z-index: 1; display: flex; align-items: center; width: 100%; height: 100%; padding: 4%; gap: 4%; }
  #art {
    height: 82%; aspect-ratio: 1;
    border-radius: 10px;
    background: #1c2331 center/cover no-repeat;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.55);
    flex: none;
  }
  #info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1.5vh; }
  #title  { font-size: clamp(18px, 9vh, 40px); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #artist { font-size: clamp(13px, 6vh, 26px); color: #aeb7c4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #album  { font-size: clamp(11px, 4vh, 18px); color: #7d8697; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #controls { display: flex; align-items: center; gap: 18px; margin-top: 1vh; }
  #controls button {
    border: 0; cursor: pointer;
    width: clamp(48px, 16vh, 72px); height: clamp(48px, 16vh, 72px);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    color: #e8ecf2;
    font-size: clamp(18px, 6vh, 26px);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  #controls button:active { background: var(--accent, #00d4ff); color: #0b0e14; }
  #controls #toggle { background: var(--accent, #00d4ff); color: #0b0e14; }
  #idle {
    position: fixed; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    background: #0b0e14;
    color: #545d6e; font-size: clamp(14px, 5vh, 22px);
  }
</style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="layout">
    <div id="art"></div>
    <div id="info">
      <div id="title"></div>
      <div id="artist"></div>
      <div id="album"></div>
      <div id="controls">
        <button id="prev" aria-label="Previous">&#9198;</button>
        <button id="toggle" aria-label="Play/Pause">&#9199;</button>
        <button id="next" aria-label="Next">&#9197;</button>
      </div>
    </div>
  </div>
  <div id="idle">Nothing playing</div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  document.getElementById('prev').addEventListener('click', () => WW.mediaControl('prev'));
  document.getElementById('toggle').addEventListener('click', () => WW.mediaControl('toggle'));
  document.getElementById('next').addEventListener('click', () => WW.mediaControl('next'));

  WW.onInit((state) => {
    document.body.style.setProperty('--accent', state.settings.accentColor || '#00d4ff');
    render(state.media);
  });
  WW.onMedia(render);

  function render(media) {
    const idle = !media || !media.available || !media.title;
    document.getElementById('idle').style.display = idle ? 'flex' : 'none';
    if (idle) return;

    document.getElementById('title').textContent = media.title || '';
    document.getElementById('artist').textContent = media.artist || '';
    document.getElementById('album').textContent = media.album || '';

    const art = media.thumbnail ? `url("${media.thumbnail}")` : 'none';
    document.getElementById('art').style.backgroundImage = art;
    document.getElementById('backdrop').style.backgroundImage = art;
  }
</script>
</body>
</html>
