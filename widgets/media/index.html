<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    user-select: none;
  }
  /* Background setting: let the dashboard wallpaper show through. */
  body.bg-transparent { background: transparent; }
  body.bg-glass { background: rgba(11, 14, 20, 0.55); }
  #backdrop {
    position: fixed; inset: -30px;
    background-size: cover; background-position: center;
    filter: blur(24px) brightness(0.3);
    z-index: 0;
  }
  #layout { position: relative; z-index: 1; display: flex; align-items: center; width: 100%; height: 100%; padding: 3.5%; gap: 4%; }
  #art {
    height: 84%; aspect-ratio: 1;
    border-radius: 10px;
    background: #1c2331 center/cover no-repeat;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.55);
    flex: none;
  }
  #info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1vh; }
  #title  { font-size: calc(clamp(17px, 8.5vh, 38px) * var(--title-scale, 1)); color: var(--title-color, #e8ecf2); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #artist { font-size: calc(clamp(13px, 5.5vh, 24px) * var(--artist-scale, 1)); color: var(--artist-color, #aeb7c4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #album  { font-size: calc(clamp(11px, 4vh, 17px) * var(--album-scale, 1)); color: var(--album-color, #7d8697); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #timeline { display: flex; align-items: center; gap: 10px; margin-top: 1.2vh; }
  #timeline time { font-size: calc(clamp(10px, 3.6vh, 14px) * var(--time-scale, 1)); color: var(--time-color, #7d8697); font-variant-numeric: tabular-nums; flex: none; }
  #bar {
    flex: 1; height: 6px; border-radius: 3px;
    background: rgba(255, 255, 255, 0.12);
    overflow: hidden;
  }
  #barFill { height: 100%; width: 0%; border-radius: 3px; background: var(--accent, #00d4ff); transition: width 0.4s linear; }
  #timeline.no-duration { visibility: hidden; }

  #controls { display: flex; align-items: center; gap: 16px; margin-top: 1vh; }
  #controls button {
    border: 0; cursor: pointer;
    width: clamp(46px, 15vh, 68px); height: clamp(46px, 15vh, 68px);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    color: #e8ecf2;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  #controls button svg { width: 44%; height: 44%; fill: currentColor; }
  #controls button:active { background: var(--accent, #00d4ff); color: #0b0e14; }
  #controls #toggle { background: var(--accent, #00d4ff); color: #0b0e14; }
  #idle {
    position: fixed; inset: 0; z-index: 2;
    display: flex; flex-direction: column; gap: 1.6vh; align-items: center; justify-content: center;
    background: #0b0e14;
    color: #545d6e; font-size: clamp(14px, 5vh, 22px);
  }
  #idle svg { width: clamp(30px, 12vh, 54px); height: clamp(30px, 12vh, 54px); fill: #2a3346; }
  #idle[hidden] { display: none; }
</style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="layout">
    <div id="art"></div>
    <div id="info">
      <div id="title"></div>
      <div id="artist"></div>
      <div id="album"></div>
      <div id="timeline">
        <time id="elapsed">0:00</time>
        <div id="bar"><div id="barFill"></div></div>
        <time id="total">0:00</time>
      </div>
      <div id="controls">
        <button id="prev" aria-label="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12 18 6v12z"/></svg>
        </button>
        <button id="toggle" aria-label="Play/Pause">
          <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button id="next" aria-label="Next">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="idle">
    <svg viewBox="0 0 24 24"><path d="M12 3v9.28a4.39 4.39 0 0 0-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21s4.5-2.01 4.5-4.5V7h4V3z"/></svg>
    <span>Nothing playing</span>
  </div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  const el = (id) => document.getElementById(id);

  el('prev').addEventListener('click', () => WW.mediaControl('prev'));
  el('toggle').addEventListener('click', () => WW.mediaControl('toggle'));
  el('next').addEventListener('click', () => WW.mediaControl('next'));

  // Position arrives every ~2 s poll; interpolate between updates while playing.
  let base = { position: null, duration: null, at: 0, playing: false };

  WW.onInit((state) => {
    document.body.classList.toggle('bg-transparent', state.settings.bgStyle === 'transparent');
    document.body.classList.toggle('bg-glass', state.settings.bgStyle === 'glass');
    document.body.style.setProperty('--accent', state.settings.accentColor || '#00d4ff');
    const s = state.settings;
    document.body.style.setProperty('--title-color', s.titleColor || '#e8ecf2');
    document.body.style.setProperty('--title-scale', (Number(s.titleSize) || 100) / 100);
    document.body.style.setProperty('--artist-color', s.artistColor || '#aeb7c4');
    document.body.style.setProperty('--artist-scale', (Number(s.artistSize) || 100) / 100);
    document.body.style.setProperty('--album-color', s.albumColor || '#7d8697');
    document.body.style.setProperty('--album-scale', (Number(s.albumSize) || 100) / 100);
    document.body.style.setProperty('--time-color', s.timeColor || '#7d8697');
    document.body.style.setProperty('--time-scale', (Number(s.timeSize) || 100) / 100);
    render(state.media);
  });
  WW.onMedia(render);

  function render(media) {
    const idle = !media || !media.available || !media.title;
    el('idle').hidden = !idle;
    if (idle) return;

    el('title').textContent = media.title || '';
    el('artist').textContent = media.artist || '';
    el('album').textContent = media.album || '';

    const playing = media.status === 'Playing';
    el('iconPlay').style.display = playing ? 'none' : 'block';
    el('iconPause').style.display = playing ? 'block' : 'none';

    base = { position: media.positionSeconds, duration: media.durationSeconds, at: Date.now(), playing };
    renderTimeline();

    const art = media.thumbnail ? `url("${media.thumbnail}")` : 'none';
    el('art').style.backgroundImage = art;
    el('backdrop').style.backgroundImage = art;
  }

  function renderTimeline() {
    const hasDuration = base.duration != null && base.duration > 0 && base.position != null;
    el('timeline').classList.toggle('no-duration', !hasDuration);
    if (!hasDuration) return;

    let position = base.position + (base.playing ? (Date.now() - base.at) / 1000 : 0);
    position = Math.min(position, base.duration);
    el('elapsed').textContent = fmt(position);
    el('total').textContent = fmt(base.duration);
    el('barFill').style.width = (position / base.duration * 100).toFixed(2) + '%';
  }

  function fmt(seconds) {
    seconds = Math.max(0, Math.round(seconds));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const pad = (n) => String(n).padStart(2, '0');
    return h > 0 ? h + ':' + pad(m) + ':' + pad(s) : m + ':' + pad(s);
  }

  setInterval(renderTimeline, 500);
</script>
</body>
</html>
