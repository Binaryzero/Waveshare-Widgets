<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Control Deck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0b0e14;
    color: #e8ecf2;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  #grid {
    display: grid;
    gap: 8px;
    padding: 8px;
    width: 100%;
    height: 100%;
  }
  button.key {
    border: 1px solid #232a3a;
    border-radius: 12px;
    background: #171c28;
    color: #e8ecf2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4%;
    cursor: pointer;
    touch-action: manipulation;
    overflow: hidden;
    min-width: 0;
    transition: transform 0.06s ease, background 0.15s ease, border-color 0.15s ease;
  }
  button.key:active { transform: scale(0.94); background: var(--accent, #00d4ff); color: #06202a; border-color: var(--accent, #00d4ff); }
  button.key .icon { font-size: clamp(18px, 9vh, 42px); line-height: 1; }
  button.key .label { font-size: clamp(9px, 3.4vh, 15px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 92%; color: #aeb7c4; }
  button.key:active .label { color: #06202a; }
  #error {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    text-align: center; padding: 16px;
    color: #ff5577; font-size: clamp(12px, 4.5vh, 18px);
    background: #0b0e14;
  }
</style>
</head>
<body>
  <div id="grid"></div>
  <div id="error"></div>

<script src="https://app.wsw/widget-api.js"></script>
<script>
  'use strict';
  WW.onInit((state) => {
    document.body.style.setProperty('--accent', state.settings.accentColor || '#00d4ff');
    render(state.settings);
  });

  function render(settings) {
    const grid = document.getElementById('grid');
    const error = document.getElementById('error');
    let buttons;
    try {
      buttons = JSON.parse(settings.buttons || '[]');
      if (!Array.isArray(buttons)) throw new Error('not an array');
    } catch (e) {
      error.textContent = 'Buttons setting is not valid JSON: ' + e.message;
      error.style.display = 'flex';
      return;
    }
    error.style.display = 'none';

    const columns = Math.max(1, Math.min(8, Number(settings.columns) || 4));
    const rows = Math.max(1, Math.ceil(buttons.length / columns));
    grid.style.gridTemplateColumns = 'repeat(' + columns + ', 1fr)';
    grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';
    grid.textContent = '';

    for (const def of buttons) {
      const btn = document.createElement('button');
      btn.className = 'key';
      if (def.icon) {
        const icon = document.createElement('div');
        icon.className = 'icon';
        icon.textContent = def.icon;
        btn.appendChild(icon);
      }
      if (def.label) {
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = def.label;
        btn.appendChild(label);
      }
      btn.addEventListener('click', () => {
        if (def.kind === 'url' && def.target) WW.openUrl(def.target);
        else if (def.kind === 'media' && def.target) WW.mediaControl(def.target);
        else if (def.kind) WW.action(def.kind, def.target);
        WW.log('deck: ' + def.kind + ' ' + (def.target || ''));
      });
      grid.appendChild(btn);
    }
  }
</script>
</body>
</html>
